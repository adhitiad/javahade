# docker-compose.app.yml
version: '3.8'
services:
  backend:
    build: ./python-service
    container_name: javahade_backend
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-javahade_db}
      - POSTGRES_USER=${POSTGRES_USER:-javahade_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secret_password}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres_server_ip}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - MONGO_DATABASE=${MONGO_DATABASE:-javahade_mongo}
      - MONGO_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-mongo_admin}
      - MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-mongo_secret}
      - MONGO_HOST=${MONGO_HOST:-mongo_server_ip}
      - MONGO_PORT=${MONGO_PORT:-27017}
    ports:
      - "8000:8000"
    volumes:
      - ./python-service:/app
      - ./logs:/var/log/joke
    depends_on:
      - redis
    networks:
      - app_network

  frontend:
    build: ./web
    container_name: javahade_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000}
    volumes:
      - ./web:/app
      - /app/node_modules
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: javahade_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network

volumes:
  redis_data:

networks:
  app_network:
    driver: bridge
