# docker-compose.postgres.yml
version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: javahade_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-javahade_db}
      POSTGRES_USER: ${POSTGRES_USER:-javahade_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret_password}
      POSTGRES_HOST_AUTH_METHOD: 'trust'
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - postgres_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-javahade_user} -d ${POSTGRES_DB:-javahade_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  postgres_network:
    driver: bridge
