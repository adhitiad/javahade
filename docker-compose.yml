
services:
  # ==============================================================
  # DATABASES & INFRASTRUCTURE
  # ==============================================================
  postgres:
    image: postgres:15-alpine
    container_name: kreativa_db
    environment:
      POSTGRES_DB: kreativa_db
      POSTGRES_USER: kreativa
      POSTGRES_PASSWORD: kreativa_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kreativa -d kreativa_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kreativa_net

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: kreativa_pgbouncer
    environment:
      DATABASE_URL: "postgres://${DB_USER:-kreativa}:${DB_PASSWORD:-kreativa_pass}@postgres:5432/${DB_NAME:-kreativa_db}"
      LISTEN_PORT: 6432
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kreativa_net

  redis:
    image: redis:7-alpine
    container_name: kreativa_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - kreativa_net

  mongodb:
    image: mongo:6
    container_name: kreativa_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - kreativa_net

  # ==============================================================
  # PYTHON / DJANGO SERVICES
  # ==============================================================
  python-api:
    build: 
      context: ./python-service
    container_name: kreativa_python
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-kreativa_db}
      - DB_USER=${DB_USER:-kreativa}
      - DB_PASSWORD=${DB_PASSWORD:-kreativa_pass}
      - DATABASE_URL=postgres://${DB_USER:-kreativa}:${DB_PASSWORD:-kreativa_pass}@postgres:5432/${DB_NAME:-kreativa_db}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ALLOWED_HOSTS=*
      - DEBUG=True
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - kreativa_net

