version: '3.8'

services:
  # ==============================================================
  # DATABASES & INFRASTRUCTURE
  # ==============================================================
  postgres:
    image: postgres:15-alpine
    container_name: kreativa_db
    environment:
      POSTGRES_DB: kreativa_db
      POSTGRES_USER: kreativa
      POSTGRES_PASSWORD: kreativa_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kreativa -d kreativa_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kreativa_net

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: kreativa_pgbouncer
    environment:
      DATABASE_URL: "postgres://kreativa:kreativa_pass@postgres:5432/kreativa_db"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kreativa_net

  redis:
    image: redis:7-alpine
    container_name: kreativa_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - kreativa_net

  # ==============================================================
  # PYTHON / DJANGO SERVICES
  # ==============================================================
  python-api:
    build: 
      context: ./python-service
    container_name: kreativa_python
    environment:
      - DB_HOST=pgbouncer
      - DB_PORT=6432
      - DB_NAME=kreativa_db
      - DB_USER=kreativa
      - DB_PASS=kreativa_pass
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - kreativa_net

  python-saga-worker:
    build: 
      context: ./python-service
    container_name: kreativa_saga_worker
    command: python manage.py run_saga_worker
    environment:
      - DB_HOST=pgbouncer
      - DB_PORT=6432
      - DB_NAME=kreativa_db
      - DB_USER=kreativa
      - DB_PASS=kreativa_pass
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
    depends_on:
      - python-api
    networks:
      - kreativa_net

  # ==============================================================
  # GO MICROSERVICES
  # ==============================================================
  booking-service:
    build:
      context: ./go-services
      args:
        SERVICE_NAME: booking-service
    container_name: kreativa_booking
    environment:
      - DB_HOST=pgbouncer
      - DB_PORT=6432
      - DB_USER=kreativa
      - DB_PASSWORD=kreativa_pass
      - DB_NAME=kreativa_db
      - REDIS_ADDR=redis:6379
      - PORT=3333
    ports:
      - "3333:3333"
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - kreativa_net

  stream-service:
    build:
      context: ./go-services
      args:
        SERVICE_NAME: stream-service
    container_name: kreativa_stream
    environment:
      - REDIS_ADDR=redis:6379
      - PORT=3334
    ports:
      - "3334:3334"
    depends_on:
      - redis
    networks:
      - kreativa_net

  chat-service:
    build:
      context: ./go-services
      args:
        SERVICE_NAME: chat-service
    container_name: kreativa_chat
    environment:
      - REDIS_ADDR=redis:6379
      - PORT=3335
    ports:
      - "3335:3335"
    depends_on:
      - redis
    networks:
      - kreativa_net

networks:
  kreativa_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
