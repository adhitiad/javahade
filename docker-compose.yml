  # ==============================================================
  # GO MICROSERVICES
  # ==============================================================
  booking-service:
    build:
      context: ./go-services
      args:
        SERVICE_NAME: booking-service
    container_name: kreativa_booking
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-kreativa_db}
      - DB_USER=${DB_USER:-kreativa}
      - DB_PASSWORD=${DB_PASSWORD:-kreativa_pass}
      - DATABASE_URL=postgres://${DB_USER:-kreativa}:${DB_PASSWORD:-kreativa_pass}@postgres:5432/${DB_NAME:-kreativa_db}?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - BOOKING_SERVICE_PORT=3333
      - PORT=3333
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:5173}
    ports:
      - "3333:3333"
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - kreativa_net

  stream-service:
    build:
      context: ./go-services
      args:
        SERVICE_NAME: stream-service
    container_name: kreativa_stream
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STREAM_SERVICE_PORT=3334
      - PORT=3334
      - MODERATION_API_URL=http://python-api:8000/api/v1/moderation/check/
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:5173}
    ports:
      - "3334:3334"
    depends_on:
      - redis
    networks:
      - kreativa_net

  chat-service:
    build:
      context: ./go-services
      args:
        SERVICE_NAME: chat-service
    container_name: kreativa_chat
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URI=mongodb://mongodb:27017
      - CHAT_SERVICE_PORT=3335
      - PORT=3335
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:5173}
    ports:
      - "3335:3335"
    depends_on:
      - redis
      - mongodb
    networks:
      - kreativa_net

  payment-service:
    build:
      context: ./go-services/payment-service
    container_name: kreativa_payment
    environment:
      - DATABASE_URL=postgres://${DB_USER:-kreativa}:${DB_PASSWORD:-kreativa_pass}@postgres:5432/${DB_NAME:-kreativa_db}?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - PORT=3336
      - VEROTEL_SHOP_ID=dummy
      - VEROTEL_SIGNATURE=dummy
      - SEGPAY_PACKAGE_ID=dummy
      - PAXUM_EMAIL=dummy
      - PAXUM_SECRET=dummy
    ports:
      - "3336:3000"
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - kreativa_net

  # ==============================================================
  # NEXT.JS FRONTEND SERVICE
  # ==============================================================
  web:
    build:
      context: ./web
    container_name: kreativa_web
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - INTERNAL_API_URL=http://python-api:8000
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-token-rahasia-kreativa-internal}
      - BETTER_AUTH_SECRET=rahasia-better-auth-kreativa-sepanjang-minimal-32-karakter
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-dummy-google-client-id}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-dummy-google-client-secret}
      - FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID:-dummy-facebook-client-id}
      - FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET:-dummy-facebook-client-secret}
      - PAYMENT_SERVICE_URL=${PAYMENT_SERVICE_URL:-http://payment-service:3000}
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      python-api:
        condition: service_started
    networks:
      - kreativa_net

networks:
  kreativa_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  mongodata:
