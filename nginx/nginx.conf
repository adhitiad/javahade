# Kreativa Platform — Nginx Reverse Proxy Configuration
# Routes requests to the correct backend service

upstream python_api {
    server 127.0.0.1:8000;
}

upstream go_booking {
    server 127.0.0.1:8080;
}

upstream go_chat {
    server 127.0.0.1:8081;
}

upstream go_stream {
    server 127.0.0.1:8082;
}

server {
    listen 80;
    server_name localhost;

    # Max upload size (for media content)
    client_max_body_size 100M;

    # ─────────────────────────────────────────
    # Python Service (Django)
    # ─────────────────────────────────────────
    # Default API routes go to Django
    location /api/v1/auth/ {
        proxy_pass http://python_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/users/ {
        proxy_pass http://python_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/creators/ {
        proxy_pass http://python_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/posts/ {
        proxy_pass http://python_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/subscriptions/ {
        proxy_pass http://python_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/payments/ {
        proxy_pass http://python_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/families/ {
        proxy_pass http://python_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/notifications/ {
        proxy_pass http://python_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/moderation/ {
        proxy_pass http://python_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin/ {
        proxy_pass http://python_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─────────────────────────────────────────
    # Go Booking Service
    # ─────────────────────────────────────────
    location /api/v1/bookings/ {
        proxy_pass http://go_booking;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/booking/ {
        proxy_pass http://go_booking;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # ─────────────────────────────────────────
    # Go Chat Service
    # ─────────────────────────────────────────
    location /ws/chat {
        proxy_pass http://go_chat;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location /api/v1/rooms/ {
        proxy_pass http://go_chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─────────────────────────────────────────
    # Go Stream Service
    # ─────────────────────────────────────────
    location /api/v1/streams/ {
        proxy_pass http://go_stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/stream/ {
        proxy_pass http://go_stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # ─────────────────────────────────────────
    # Health checks
    # ─────────────────────────────────────────
    location /health/booking {
        proxy_pass http://go_booking/health;
    }

    location /health/chat {
        proxy_pass http://go_chat/health;
    }

    location /health/stream {
        proxy_pass http://go_stream/health;
    }
}
