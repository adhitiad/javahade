<div id="notification-badge-container" class="relative" x-data="{ open: false }">
    <button @click="open = !open" type="button" class="relative p-2 text-gray-400 hover:text-white transition-colors focus:outline-none" aria-label="Notifikasi">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
        </svg>
        
        {% if unread_count > 0 %}
        <span class="absolute top-1 right-1 flex items-center justify-center w-4 h-4 text-[10px] font-bold text-white bg-red-500 rounded-full border-2 border-gray-900 animate-pulse-slow">
            {{ unread_count }}
        </span>
        {% endif %}
    </button>

    <!-- Dropdown Panel (Lazy loaded via HTMX when opened) -->
    <div x-show="open" @click.away="open = false" style="display: none;"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-75"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         class="absolute right-0 mt-2 w-80 sm:w-96 glass rounded-2xl shadow-2xl py-2 z-50 overflow-hidden border border-gray-700/50"
         hx-get="{% url 'core_ui:htmx_notification_dropdown' %}"
         hx-trigger="intersect once"
         hx-target="this"
         hx-swap="innerHTML">
         
        <div class="p-6 text-center text-gray-400">
            <!-- Loading spinner -->
            <svg class="animate-spin h-6 w-6 mx-auto mb-2 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-sm">Memuat notifikasi...</p>
        </div>
    </div>
</div>
