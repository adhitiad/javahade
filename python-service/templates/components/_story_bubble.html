<a href="#" class="flex-shrink-0 flex flex-col items-center gap-2 group cursor-pointer">
    <div class="w-16 h-16 rounded-full p-[3px] bg-gradient-to-tr from-rose-400 via-fuchsia-500 to-indigo-500 group-hover:animate-pulse shadow-lg shadow-pink-500/30 transition-all">
        <div class="w-full h-full rounded-full bg-gray-900 border-2 border-transparent flex items-center justify-center text-xl overflow-hidden">
            {% if story.creator.profile_picture %}
                <img src="{{ story.creator.profile_picture.url }}" alt="{{ story.creator.username }}" class="w-full h-full object-cover">
            {% else %}
                <span class="text-white font-bold">{{ story.creator.username|make_list|first|upper }}</span>
            {% endif %}
        </div>
    </div>
    <span class="text-xs text-white max-w-[64px] truncate">{{ story.creator.username }}</span>
</a>
