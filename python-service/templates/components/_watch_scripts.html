<!-- Load OvenPlayer & OvenLiveKit -->
<script src="https://cdn.jsdelivr.net/npm/ovenplayer/dist/ovenplayer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ovenlivekit@1.5.0/dist/OvenLiveKit.min.js"></script>
<!-- Load DOMPurify for Security (XSS Prevention) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

<script>
// ─── CONFIG ──────────────────────────────────────────────
const STREAM_ID = "{{ stream.id }}";
const CURRENT_USER = "{{ request.user.username }}";
const CURRENT_USER_ID = "{{ request.user.id }}";
const IS_HOST = {{ is_host|yesno:"true,false" }};
const WS_URL = `ws://localhost:8082/ws/stream/${STREAM_ID}/interact?username=${encodeURIComponent(CURRENT_USER)}`;

let ws = null;

const chatBox = document.getElementById("stream-chat-messages");
const chatForm = document.getElementById("stream-chat-form");
const chatInput = document.getElementById("stream-chat-input");
const statusDot = document.getElementById("chat-status-dot");
const viewerCountEl = document.getElementById("viewer-count");
const reactionsContainer = document.getElementById("reactions-container");

// ─── WebSocket Connection ─────────────────────────────────
function connectWS() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
        statusDot.classList.remove("bg-red-500");
        statusDot.classList.add("bg-emerald-500");
        statusDot.title = "Terhubung";
        chatInput.disabled = false;
        appendSystem("Terhubung ke live chat. Selamat menonton!");
    };

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        
        switch(data.type) {
            case "comment":
                appendComment(data.payload);
                break;
            case "reaction":
                spawnReaction(data.payload.reaction);
                break;
            case "viewer_joined":
                viewerCountEl.textContent = data.payload.viewer_count || 0;
                appendSystem(`${data.payload.username || 'Seseorang'} bergabung 👋`);
                break;
            case "viewer_left":
                viewerCountEl.textContent = data.payload.viewer_count || 0;
                break;
            case "gift":
                appendGift(data.payload);
                // Jika ada stiker URL, tampilkan overlay animasi besar
                if (data.payload.sticker_url) {
                    showStickerOverlay(data.payload.sticker_url, data.payload.username, data.payload.amount);
                }
                break;
            case "error":
                appendError(data.payload.message);
                break;
        }
    };

    ws.onclose = () => {
        statusDot.classList.remove("bg-emerald-500");
        statusDot.classList.add("bg-red-500");
        statusDot.title = "Terputus";
        chatInput.disabled = true;
        appendError("Koneksi terputus. Mencoba menghubungkan ulang...");
        setTimeout(connectWS, 3000);
    };

    ws.onerror = () => {
        appendError("Gagal terhubung ke server streaming.");
    };
}

// ─── Chat Functions ──────────────────────────────────────
function appendComment(payload) {
    const isMe = String(payload.user_id) === String(CURRENT_USER_ID);
    const div = document.createElement("div");
    div.className = `flex gap-2 items-start animate-fade-in ${isMe ? 'flex-row-reverse' : ''}`;
    div.innerHTML = `
        <div class="w-7 h-7 rounded-full ${isMe ? 'bg-indigo-500/30 text-indigo-400' : 'bg-white/10 text-gray-400'} flex items-center justify-center text-xs font-bold flex-shrink-0">
            ${(payload.username || "?").charAt(0).toUpperCase()}
        </div>
        <div class="max-w-[80%]">
            <span class="text-xs ${isMe ? 'text-indigo-400' : 'text-gray-500'} font-bold">${DOMPurify.sanitize(payload.username || 'Anon')}</span>
            <p class="text-sm text-gray-200 mt-0.5">${DOMPurify.sanitize(payload.content)}</p>
        </div>
    `;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function appendGift(payload) {
    const div = document.createElement("div");
    div.className = "text-center animate-fade-in";
    // Sanitize URL to prevent javascript: URIs
    const safeUrl = payload.sticker_url ? DOMPurify.sanitize(payload.sticker_url, {ALLOWED_ATTR: []}) : '';
    const stickerThumb = safeUrl 
        ? `<img src="${safeUrl}" class="w-12 h-12 inline-block rounded-lg mx-1">`
        : '';
    div.innerHTML = `
        <div class="inline-block px-4 py-2 rounded-xl bg-gradient-to-r from-amber-500/20 to-orange-500/20 border border-amber-500/30">
            <span class="text-amber-400 font-bold text-sm">
                🎁 ${DOMPurify.sanitize(payload.username || 'Seseorang')} mengirim gift!
                <span class="text-emerald-400">${formatPrice(Number(payload.amount || 0))}</span>
            </span>
            ${stickerThumb}
        </div>
    `;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function appendSystem(text) {
    const div = document.createElement("div");
    div.className = "text-center animate-fade-in";
    div.innerHTML = `<span class="inline-block px-3 py-1 rounded-full bg-gray-800/50 text-xs text-gray-500">${DOMPurify.sanitize(text)}</span>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function appendError(text) {
    const div = document.createElement("div");
    div.className = "text-center animate-fade-in";
    div.innerHTML = `<span class="inline-block px-3 py-1 rounded-full bg-red-500/10 border border-red-500/30 text-xs text-red-400 font-bold">⚠️ ${DOMPurify.sanitize(text)}</span>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function escapeHtml(text) {
    // Digantikan dengan DOMPurify di level rendering
    return DOMPurify.sanitize(text);
}

// ─── Send Comment ────────────────────────────────────────
chatForm.addEventListener("submit", (e) => {
    e.preventDefault();
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const text = chatInput.value.trim();
    if (!text) return;
    
    ws.send(JSON.stringify({
        type: "comment",
        room_id: STREAM_ID,
        payload: { content: text }
    }));
    chatInput.value = "";
});

// ─── Reactions ───────────────────────────────────────────
document.querySelectorAll(".reaction-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        const reaction = btn.dataset.reaction;
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        
        ws.send(JSON.stringify({
            type: "reaction",
            room_id: STREAM_ID,
            payload: { reaction: reaction }
        }));
    });
});

function spawnReaction(emoji) {
    const el = document.createElement("div");
    el.textContent = emoji;
    el.className = "absolute text-3xl pointer-events-none";
    el.style.bottom = "0";
    el.style.left = Math.random() * 40 + "px";
    el.style.opacity = "1";
    el.style.transition = "none";
    reactionsContainer.appendChild(el);

    // Force reflow
    el.offsetHeight;

    // Animate upward and fade
    const duration = 2000 + Math.random() * 1500;
    el.style.transition = `transform ${duration}ms ease-out, opacity ${duration}ms ease-out`;
    el.style.transform = `translateY(-${300 + Math.random() * 200}px) scale(${0.6 + Math.random() * 0.8}) rotate(${-15 + Math.random() * 30}deg)`;
    el.style.opacity = "0";

    setTimeout(() => el.remove(), duration);
}

// ─── WebRTC Streaming (OME) dengan CDN & Keamanan ────────────────────────────────
const SIGNED_TOKEN = "{{ signed_token }}";
const CDN_DOMAIN = "live.javahade.app"; // Simulasi CDN
// const OME_WS_URL = `ws://localhost:3333/app/${STREAM_ID}`; // URL Lama
const OME_WS_URL_BASE = `wss://${CDN_DOMAIN}/app/${STREAM_ID}`;

{% if is_host %}
// ─── HOST: OvenLiveKit ──────────────────────────────────
(async function initLiveKit() {
    try {
        const liveKit = OvenLiveKit.create();
        
        await liveKit.attachMedia(document.getElementById("host-camera"));
        
        let camEnabled = true;
        let micEnabled = true;

        document.getElementById("btn-toggle-cam").addEventListener("click", () => {
            camEnabled = !camEnabled;
            // OvenLiveKit API to toggle video
            // Currently relies on the local stream track state
            const stream = document.getElementById("host-camera").srcObject;
            if (stream) {
                stream.getVideoTracks().forEach(t => t.enabled = camEnabled);
            }
            document.getElementById("btn-toggle-cam").classList.toggle("bg-red-500/50", !camEnabled);
        });

        document.getElementById("btn-toggle-mic").addEventListener("click", () => {
            micEnabled = !micEnabled;
            const stream = document.getElementById("host-camera").srcObject;
            if (stream) {
                stream.getAudioTracks().forEach(t => t.enabled = micEnabled);
            }
            document.getElementById("btn-toggle-mic").classList.toggle("bg-red-500/50", !micEnabled);
        });

        document.getElementById("btn-end-stream").addEventListener("click", () => {
            if (confirm("Anda yakin ingin mengakhiri siaran?")) {
                liveKit.stopRecord();
                liveKit.remove();
                
                // Panggil Go stream-service untuk stop stream
                fetch(`/api/v1/streams/${STREAM_ID}/stop`, {
                    method: 'PUT',
                    headers: {'Authorization': `Bearer ${CURRENT_USER}`} // Sesuaikan dengan auth Go
                }).catch(e => console.error("Error stopping stream:", e));
                
                window.location.href = "{% url 'streaming_ui:list' %}";
            }
        });
        
        // Start publishing to OME (Host uses bypass/raw stream directly to origin)
        liveKit.startRecord(`wss://origin.javahade.app/app/${STREAM_ID}?token=${SIGNED_TOKEN}`);
        
    } catch (err) {
        console.error("Gagal mengakses kamera:", err);
        appendError("Gagal mengakses kamera/mikrofon. Pastikan izin browser sudah diberikan.");
    }
})();
{% else %}
// ─── VIEWER: OvenPlayer dengan Adaptive Bitrate (ABR) ─────────────────────────────────
(function initPlayer() {
    const player = OvenPlayer.create('player', {
        sources: [
            {
                label: 'Auto (ABR)',
                type: 'webrtc',
                file: `${OME_WS_URL_BASE}?token=${SIGNED_TOKEN}` // OvenMediaEngine ABR via WebRTC
            },
            {
                label: '720p',
                type: 'webrtc',
                file: `${OME_WS_URL_BASE}_720p?token=${SIGNED_TOKEN}`
            },
            {
                label: '480p (Data Saver)',
                type: 'webrtc',
                file: `${OME_WS_URL_BASE}_480p?token=${SIGNED_TOKEN}`
            }
        ],
        autoStart: true,
        mute: true, // Autoplay policy
        webrtcConfig: {
            timeoutMaxRetry: 4,
            connectionTimeout: 10000
        }
    });

    // Jalankan Animasi Forensic Watermark
    const watermark = document.getElementById("forensic-watermark");
    if (watermark) {
        setInterval(() => {
            // Gerakkan watermark secara acak menutupi player untuk mencegah Screen Capture
            const maxX = window.innerWidth * 0.5; // Batasi agar tidak keluar layar
            const maxY = window.innerHeight * 0.5;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            watermark.style.transform = `translate(${randomX}px, ${randomY}px)`;
            watermark.style.opacity = (Math.random() * 0.3) + 0.1; // Kedipkan secara acak (0.1 - 0.4 opacity)
        }, 3000); // Bergerak setiap 3 detik
    }

    player.on('error', function(error) {
        console.error("Player Error:", error);
        appendError("Gagal memutar video. Stream mungkin belum mulai atau sudah berakhir.");
    });
})();
{% endif %}

// ─── Stiker Modal & Tab Logic ────────────────────────────
const PACK_URLS = {
    kiss: "https://s3.getstickerpack.com/storage/uploads/sticker-pack/kiss-me-3deluxe",
    emoji: "https://s3.getstickerpack.com/storage/uploads/sticker-pack/mk-rmx-emoji-sex-part-1-1",
    blondenun: "https://s3.getstickerpack.com/storage/uploads/sticker-pack/blondenun-part-1",
    morgana: "https://s3.getstickerpack.com/storage/uploads/sticker-pack/morgana-the-witch-1"
};

function toggleStickerModal() {
    const modal = document.getElementById('stickerModal');
    modal.classList.toggle('hidden');
}

// Tab switching
document.querySelectorAll('.sticker-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        // Reset tabs
        document.querySelectorAll('.sticker-tab').forEach(t => {
            t.classList.remove('active','text-white','border-indigo-500');
            t.classList.add('text-gray-400','border-transparent');
        });
        tab.classList.add('active','text-white','border-indigo-500');
        tab.classList.remove('text-gray-400','border-transparent');
        
        // Show/hide packs
        document.querySelectorAll('.sticker-pack-grid').forEach(g => g.classList.add('hidden'));
        document.getElementById('pack-' + tab.dataset.pack).classList.remove('hidden');
    });
});

function sendSticker(pack, stickerName, price) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        appendError("Tidak terhubung ke server.");
        return;
    }
    
    const stickerUrl = PACK_URLS[pack] + "/" + stickerName + ".webp?d=200x200";
    
    ws.send(JSON.stringify({
        type: "gift",
        room_id: STREAM_ID,
        payload: {
            gift_type: "sticker",
            sticker_pack: pack,
            sticker_name: stickerName,
            sticker_url: stickerUrl,
            amount: price,
            animation: "overlay"
        }
    }));
    
    toggleStickerModal();
}

function showStickerOverlay(stickerUrl, username, amount) {
    const overlay = document.getElementById('sticker-gift-overlay');
    const img = document.getElementById('sticker-gift-img');
    img.src = stickerUrl;
    overlay.classList.remove('hidden');
    
    // Animasi: muncul besar lalu menghilang
    img.style.transform = 'scale(0)';
    img.style.transition = 'transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55), opacity 0.3s ease';
    img.style.opacity = '1';
    
    requestAnimationFrame(() => {
        img.style.transform = 'scale(1)';
    });
    
    setTimeout(() => {
        img.style.opacity = '0';
        img.style.transform = 'scale(1.5)';
        setTimeout(() => {
            overlay.classList.add('hidden');
            img.style.transform = 'scale(0)';
            img.style.opacity = '1';
        }, 400);
    }, 3000);
}

// ─── Init & DOMContentLoaded ─────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
    connectWS();
});
</script>
{% endblock %}
