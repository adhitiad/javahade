        <!-- ===== LEFT: VIDEO PLAYER ===== -->
        <div class="flex-1 flex flex-col glass rounded-3xl overflow-hidden border border-white/5 relative shadow-2xl">
            <!-- Player Header -->
            <div class="absolute top-0 left-0 right-0 p-5 bg-gradient-to-b from-black/80 to-transparent z-20 flex justify-between items-start pointer-events-none">
                <div>
                    <span class="inline-flex items-center gap-2 px-3 py-1 rounded-lg bg-red-500 text-white text-xs font-bold mb-2 shadow-lg shadow-red-500/30">
                        <span class="w-2 h-2 rounded-full bg-white animate-pulse"></span> LIVE
                    </span>
                    <h1 class="text-xl font-bold text-white drop-shadow-lg">{{ stream.title }}</h1>
                    <p class="text-sm text-gray-300 mt-1">@{{ stream.host.username }}</p>
                </div>
                <div class="flex items-center gap-2 px-3 py-1.5 rounded-xl bg-black/50 backdrop-blur text-sm text-white border border-white/10 pointer-events-auto">
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                    <span id="viewer-count" class="font-bold">0</span>
                </div>
            </div>

            <!-- Reactions Floating Container -->
            <div id="reactions-container" class="absolute bottom-24 left-6 z-30 pointer-events-none w-16" style="height: 70%"></div>

            <!-- Video Element -->
            <div id="player-container" class="w-full h-full bg-black flex items-center justify-center relative">
                {% if is_host %}
                <!-- HOST: Webcam Preview -->
                <video id="host-camera" autoplay muted playsinline class="w-full h-full object-cover"></video>
                <div id="host-controls" class="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 flex items-center gap-3">
                    <button id="btn-toggle-cam" class="p-3 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur text-white border border-white/10 transition-all" title="Toggle Kamera">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    </button>
                    <button id="btn-toggle-mic" class="p-3 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur text-white border border-white/10 transition-all" title="Toggle Mikrofon">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 016 0v6a3 3 0 01-3 3z"/></svg>
                    </button>
                    <button id="btn-end-stream" class="px-5 py-3 rounded-full bg-red-600 hover:bg-red-500 text-white font-bold text-sm shadow-lg shadow-red-500/25 transition-all">
                        Akhiri Siaran
                    </button>
                </div>
                {% else %}
                <!-- VIEWER: Stream Player (OvenPlayer) -->
                <div id="player" class="w-full h-full bg-black"></div>
                <!-- Dynamic Forensic Watermark (DRM/Anti-Piracy) -->
                <div id="forensic-watermark" class="absolute pointer-events-none text-white/30 font-mono text-[10px] sm:text-xs md:text-sm font-bold z-40 select-none tracking-widest mix-blend-overlay transition-all duration-[3000ms] ease-in-out" style="text-shadow: 1px 1px 0px rgba(0,0,0,0.5);">
                    {{ request.user.username }} • {{ viewer_ip }}
                </div>
                {% endif %}
            </div>

            <!-- Interaction Bar (Bottom Overlay) -->
            <div class="absolute bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-black/90 via-black/50 to-transparent z-20 pointer-events-none flex justify-between items-end">
                <div class="pointer-events-auto flex gap-2">
                    <button class="reaction-btn p-3 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur text-xl transition-transform hover:scale-125 active:scale-90" data-reaction="❤️">❤️</button>
                    <button class="reaction-btn p-3 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur text-xl transition-transform hover:scale-125 active:scale-90" data-reaction="🔥">🔥</button>
                    <button class="reaction-btn p-3 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur text-xl transition-transform hover:scale-125 active:scale-90" data-reaction="👏">👏</button>
                    <button class="reaction-btn p-3 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur text-xl transition-transform hover:scale-125 active:scale-90" data-reaction="😂">😂</button>
                </div>
                <div class="pointer-events-auto">
                    <button id="btn-gift" onclick="toggleStickerModal()" class="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-white font-bold shadow-lg shadow-orange-500/25 transition-transform hover:-translate-y-1">
                        <span>🎁</span> Kirim Stiker
                    </button>
                </div>
            </div>

            <!-- Stiker Gift Overlay (saat dikirim) -->
            <div id="sticker-gift-overlay" class="absolute inset-0 z-40 pointer-events-none flex items-center justify-center hidden">
                <img id="sticker-gift-img" src="" class="w-48 h-48 object-contain animate-bounce drop-shadow-2xl" style="filter: drop-shadow(0 0 30px rgba(255,200,0,0.6));">
            </div>
        </div>
